<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mode & Luxury | DECEPTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #f5f5f5; font-family: 'Playfair Display', serif; overflow: hidden; }
        #smoke-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* ①のレイアウトとアニメーションを維持 */
        .container { 
            position: relative; 
            z-index: 2; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100%; 
            text-align: center; 
            pointer-events: none; 
            
            opacity: 0;
            filter: blur(12px);
            transform: scale(0.9);
            transition: 
                opacity 2.5s cubic-bezier(0.2, 0, 0.2, 1),
                filter 2.5s cubic-bezier(0.2, 0, 0.2, 1),
                transform 2.5s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .container.is-visible {
            opacity: 1;
            filter: blur(0px);
            transform: scale(1);
        }
        
        .logo-mark { 
            font-family: 'Bodoni Moda', serif; 
            font-size: clamp(3.5rem, 15vw, 6.5rem); 
            font-style: italic;
            margin-bottom: 5px; 
            color: #111; 
            line-height: 1;
        }
        
        .brand-name { 
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(0.9rem, 4vw, 1.6rem); 
            font-weight: 700; 
            margin-bottom: clamp(30px, 8vh, 80px); 
            letter-spacing: 0.5em; 
            text-indent: 0.5em; 
            color: #111; 
            text-transform: uppercase;
        }

        .tagline { 
            font-size: clamp(10px, 2.5vw, 13px);
            font-weight: 400;
            text-transform: uppercase; 
            letter-spacing: 0.15em;
            border-top: 1px solid rgba(0,0,0,0.1); 
            border-bottom: 1px solid rgba(0,0,0,0.1); 
            padding: clamp(20px, 5vh, 40px) 0; 
            width: 85%; 
            max-width: 800px; 
            color: #444; 
            pointer-events: auto;
            display: flex;
            justify-content: center;
            gap: clamp(10px, 3vw, 30px); 
            flex-wrap: wrap;
        }

        .tagline a {
            text-decoration: none;
            color: #666;
            transition: all 0.5s ease;
            white-space: nowrap;
        }

        .tagline a:hover {
            color: #000;
            transform: translateY(-3px);
            letter-spacing: 0.25em;
        }
    </style>
</head>
<body>
    <canvas id="smoke-canvas"></canvas>
    
    <div class="container" id="main-content">
        <div class="logo-mark">CO.</div>
        <div class="brand-name">Deception</div>
        <nav class="tagline">
            <a href="/">HOME</a>
            <a href="about.html">会社概要</a>
            <a href="business.html">事業内容</a>
            <a href="contact.html">お問い合わせ</a>
        </nav>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform float time;
        uniform vec2 resolution;
        uniform vec2 mouse;
        varying vec2 vUv;

        float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
        float noise(vec2 p) {
            vec2 i = floor(p); vec2 f = fract(p);
            f = f*f*(3.0-2.0*f);
            return mix(mix(hash(i + vec2(0,0)), hash(i + vec2(1,0)), f.x),
                       mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
        }

        float fbm(vec2 p) {
            float v = 0.0; float a = 0.5;
            for (int i = 0; i < 4; i++) {
                v += a * noise(p);
                p *= 2.2; a *= 0.5;
            }
            return v;
        }

        void main() {
            vec2 p = (vUv * 2.0 - 1.0) * vec2(resolution.x / resolution.y, 1.0);
            vec2 m = (mouse * 2.0 - 1.0) * vec2(resolution.x / resolution.y, 1.0);

            float slowTime = time * 0.12; 

            // 多方面への動きのコア
            vec2 drift = vec2(
                sin(slowTime * 0.7) * 0.3 + fbm(p + slowTime * 0.3),
                cos(slowTime * 0.5) * 0.3 + fbm(p - slowTime * 0.2)
            );

            // Domain Warping
            vec2 q = vec2( fbm( p + drift + vec2(0.0,0.0) ),
                           fbm( p + drift + vec2(5.2,1.3) ) );
            
            vec2 r = vec2( fbm( p + 4.0*q + vec2(1.7,9.2) + slowTime * 0.15 ),
                           fbm( p + 4.0*q + vec2(8.3,2.8) + slowTime * 0.126 ) );

            float f = fbm( p + 4.0*r );

            float mouseDist = length(p - m);
            float mouseInfluence = exp(-mouseDist * 2.2);

            float mask = (1.0 - smoothstep(0.1, 1.9, length(p)));
            
            float blushAlpha = smoothstep(0.3, 0.75, f);
            blushAlpha = pow(blushAlpha, 1.8);

            float finalAlpha = blushAlpha * mask * (0.12 + mouseInfluence * 0.32);

            vec3 bgColor = vec3(0.96, 0.96, 0.96); 
            vec3 smokeColor = vec3(0.08, 0.08, 0.08);

            gl_FragColor = vec4(mix(bgColor, smokeColor, finalAlpha), 1.0);
        }
    </script>

    <script>
        const canvas = document.getElementById('smoke-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        const camera = new THREE.Camera();
        const uniforms = {
            time: { value: 0 },
            resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            mouse: { value: new THREE.Vector2(0.5, 0.5) }
        };

        const material = new THREE.ShaderMaterial({
            uniforms,
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent
        });

        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

        window.addEventListener('mousemove', e => {
            uniforms.mouse.value.x = e.clientX / window.innerWidth;
            uniforms.mouse.value.y = 1 - e.clientY / window.innerHeight;
        });

        function animate(t) {
            uniforms.time.value = t * 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate(0);

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
        });

        // ①のアニメーション開始タイミング
        window.addEventListener('DOMContentLoaded', () => {
            const content = document.getElementById('main-content');
            setTimeout(() => {
                content.offsetHeight; 
                content.classList.add('is-visible');
            }, 500);
        });
    </script>
</body>
</html>
